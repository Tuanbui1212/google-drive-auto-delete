<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Xóa ảnh Google Photos</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Xóa ảnh</h1>
      <p class="hint">
        Đăng nhập Google Photos trong Chrome profile này. Bật tự động xóa để
        không cần bấm tay mỗi lần.
      </p>

      <div id="accountBanner" class="account-banner">Đang nhận diện tài khoản...</div>

      <label for="apiUrl">Backend API</label>
      <input id="apiUrl" type="text" placeholder="http://localhost:5000" />

      <label for="email">Tài khoản Google Photos</label>
      <div class="email-row">
        <input id="email" type="email" placeholder="Mở photos.google.com để tự nhận diện" readonly />
        <button id="refreshAccountBtn" type="button" class="icon-btn" title="Nhận diện lại">↻</button>
      </div>
      <p class="email-hint">Tự động lấy email từ tab Google Photos đang mở. Đổi nick trên Photos → bấm ↻</p>

      <div id="photoStats" class="photo-stats">Đang tải danh sách...</div>

      <div class="auto-section">
        <label class="toggle-row">
          <input id="autoDeleteEnabled" type="checkbox" />
          <span>Tự động xóa sau</span>
          <input
            id="delayMinutes"
            type="number"
            min="1"
            max="1440"
            value="5"
          />
          <span>phút</span>
        </label>
        <p id="autoStatus" class="auto-status">Tự động xóa: tắt</p>
      </div>

      <button id="saveAutoBtn" type="button" class="secondary-btn">
        Lưu cài đặt tự động
      </button>

      <button id="deleteExpiredBtn" type="button" class="warning-btn">
        Xóa ảnh đã quá hạn
      </button>

      <button id="deleteBtn" type="button">Xóa ngay (tất cả)</button>

      <div id="status" class="status hidden"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
