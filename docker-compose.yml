version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"
    environment:
      STRICT_PORT: "true"
      PORT: ${BACKEND_PORT:-5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend-data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    env_file:
      - ./frontend/.env
    restart: always
    depends_on:
      - backend
